<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="/static/gg_sans.css">
    <link rel="stylesheet" href="/static/search.css">
</head>
<body>
    <div class="navbar">
        <h1>Grimora</h1>
        <form action="/search" method="get">
            <div class="searchbox">
                <input type="text" name="query" id="searchbox" value="{{ query }}">
                <a class="upload-button" role="button" href="/upload">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!--!Font Awesome Free v7.0.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.--><path d="M256 109.3L256 320c0 17.7-14.3 32-32 32s-32-14.3-32-32l0-210.7-41.4 41.4c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3l96-96c12.5-12.5 32.8-12.5 45.3 0l96 96c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L256 109.3zM224 400c44.2 0 80-35.8 80-80l80 0c35.3 0 64 28.7 64 64l0 32c0 35.3-28.7 64-64 64L64 480c-35.3 0-64-28.7-64-64l0-32c0-35.3 28.7-64 64-64l80 0c0 44.2 35.8 80 80 80zm144 24a24 24 0 1 0 0-48 24 24 0 1 0 0 48z"/></svg>
                </a>
            </div>
        </form>
    </div>
    <div id="results-area">
        {% macro result(res) -%}
            <a class="result-wrapper" href="{{ transcripts_url }}{{ res.id }}">
                <div class="result">
                    <h1 class="title">{{ res.name }}</h1>
                    <span class="description">{{ res.description }}</span>
                    <span class="upload-time">{{ res.added.strftime("%-d/%m/%Y") }}</span>
                    <span class="archive-time">{{ res.message_start.strftime("%-d/%m/%Y") }} - {{ res.message_end.strftime("%-d/%m/%Y") }}</span>
                </div>
            </a>
        {%- endmacro %}
        {% for res in results %}
            {{ result(res) }}
        {% endfor %}
    </div>
</body>
</html>
